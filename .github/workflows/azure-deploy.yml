name: Build and deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Gate: tests and dependency scans must pass before anything deploys.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Run backend tests
        run: dotnet test tests/tickets.Tests/tickets.Tests.csproj --configuration Release

      - name: Scan production NuGet dependencies (fail on High/Critical)
        run: |
          dotnet list tickets.csproj package --vulnerable --include-transitive > vuln.txt 2>&1 || true
          cat vuln.txt
          if grep -E "Critical|High" vuln.txt; then
            echo "::error::High/Critical vulnerable NuGet packages found"; exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit production npm dependencies
        working-directory: ClientApp
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high

  build-and-deploy:
    needs: test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build React frontend
        working-directory: ClientApp
        run: |
          npm ci
          npm run build

      - name: Publish .NET app
        run: dotnet publish tickets.csproj -c Release -o ${{ github.workspace }}/publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: cinema-app-adaf
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/publish
